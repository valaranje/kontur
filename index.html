<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Контур Mini App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<!-- ЯНДЕКС КАРТЫ -->
<script src="https://api-maps.yandex.ru/2.1/?apikey=f7f8fdcb-bc92-4437-97ae-f3edbb4bc40a&lang=ru_RU"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- MAIN SCREEN -->
  <div id="main" class="screen active">
    <div class="logo-container">
      <img src="img/logo.png" alt="Логотип">
    </div>
    <h2 id="city">Москва</h2>
    <div id="map"></div>

    <div class="cities">
      <div class="city-card" onclick="setCity('moscow')">Москва</div>
      <div class="city-card" onclick="setCity('kazan')">Казань</div>
      <div class="city-card" onclick="setCity('samara')">Самара</div>
    </div>

    <button class="btn start" onclick="startRun()">Начать забег</button>
  </div>

  <!-- RUN SCREEN -->
  <div id="run" class="screen">
    <div id="run-map"></div>
    <div class="run-ui">
      <button class="btn pause" onclick="pauseRun()">Пауза</button>
      <button class="btn stop" onclick="stopRun()">Стоп</button>
    </div>
  </div>

  <!-- PROFILE SCREEN -->
  <div id="profile" class="screen">
    <button class="back" onclick="go('main')">←</button>
    <h2 id="profile-name"></h2>
    <div id="profile-map"></div>
  </div>

  <!-- Нижняя навигация -->
  <div class="bottom-nav">
    <button onclick="go('main')">🏠</button>
    <button onclick="go('cities')">🌆</button>
    <button onclick="go('history')">📜</button>
    <button onclick="go('profile')">👤</button>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
</script>

<script src="app.js"></script>

</body>
</html>
